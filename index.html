<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Mirror — LearningAIwithLaureen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030d1c;font-family:'DM Sans',sans-serif;overflow:hidden;cursor:none;color:#fff}
canvas{position:fixed;inset:0;z-index:0}
#cdot{position:fixed;width:7px;height:7px;border-radius:50%;background:#00d4c8;transform:translate(-50%,-50%);pointer-events:none;z-index:9999;mix-blend-mode:screen}
#cring{position:fixed;width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,212,200,.35);transform:translate(-50%,-50%);pointer-events:none;z-index:9998;transition:left .1s,top .1s}
#hdr{position:fixed;top:0;left:0;right:0;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:200}
.hlogo{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}.hlogo em{color:#00d4c8;font-style:normal}
.hbadge{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,160,48,.7);border:1px solid rgba(232,160,48,.2);padding:.28rem .8rem;border-radius:20px}
svg#wsvg{position:fixed;inset:0;z-index:5;pointer-events:none;overflow:visible}
.nc{position:fixed;transform:translate(-50%,-50%);z-index:20;cursor:pointer;text-align:center}
.norb{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:transform .2s,filter .2s;position:relative}
.norb:hover{transform:scale(1.2);filter:brightness(1.3)}
.norb::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid currentColor;opacity:.2;animation:nring 3s ease-in-out infinite}
.nlbl{margin-top:6px;font-family:'Syne',sans-serif;font-size:.48rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap;text-shadow:0 2px 6px #000;line-height:1.5}
.nfig{font-size:.7rem;margin-top:3px;opacity:.7}
#bw{position:fixed;transform:translate(-50%,-50%);z-index:25;cursor:pointer}
.br1{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(0,212,200,.2);animation:spin 14s linear infinite}
.br2{position:absolute;inset:-30px;border-radius:50%;border:1px dashed rgba(232,160,48,.15);animation:spin 22s linear infinite reverse}
.bc{width:108px;height:108px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#1a3a6a,#0a1e3a 60%,#061228);border:2px solid rgba(0,212,200,.35);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;box-shadow:0 0 50px rgba(0,212,200,.25),0 0 100px rgba(0,212,200,.08)}
.be{font-size:2.4rem;animation:bpulse 3s ease-in-out infinite}
.bl{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.22em;text-transform:uppercase;color:#00d4c8;opacity:.8}
#panel{position:fixed;top:0;right:-450px;width:430px;height:100vh;background:linear-gradient(160deg,rgba(5,18,40,.98),rgba(8,22,50,.98));border-left:1px solid rgba(0,212,200,.12);transition:right .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:300}
#panel.open{right:0}
.pcls{position:absolute;top:1rem;right:1rem;background:rgba(0,212,200,.08);border:1px solid rgba(0,212,200,.18);color:#00d4c8;width:28px;height:28px;cursor:pointer;font-size:.8rem;border-radius:50%}
#pb{padding:2rem 1.8rem 3rem}
.pt{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,212,200,.6);margin-bottom:.6rem}
.pi{font-size:2.6rem;margin-bottom:.5rem;display:block}
.pti{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.35rem;line-height:1.2}
.ps{font-size:.77rem;color:rgba(255,255,255,.38);margin-bottom:1.4rem;line-height:1.65;font-style:italic}
.par{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:1.2rem;border-radius:10px;overflow:hidden}
.ph{padding:1rem;background:linear-gradient(135deg,rgba(68,136,255,.08),rgba(68,136,255,.04))}
.pa{padding:1rem;background:linear-gradient(135deg,rgba(0,212,200,.08),rgba(0,212,200,.04))}
.pf{font-size:2rem;margin-bottom:.4rem;display:block;text-align:center}
.pb2{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;padding:.16rem .45rem;border-radius:3px;display:inline-block;margin-bottom:.45rem}
.by{background:rgba(68,136,255,.1);color:#88aaff;border:1px solid rgba(68,136,255,.2)}
.ba2{background:rgba(0,212,200,.08);color:#00d4c8;border:1px solid rgba(0,212,200,.2)}
.phd{font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;color:#fff;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em}
.pbd{font-size:.72rem;color:rgba(255,255,255,.45);line-height:1.65}
.baw{border-radius:8px;overflow:hidden;margin-bottom:1rem;border:1px solid rgba(255,255,255,.05)}
.bar{display:flex;align-items:flex-start;gap:.7rem;padding:.8rem 1rem}
.bar+.bar{border-top:1px solid rgba(255,255,255,.05)}
.bbef{background:rgba(255,80,100,.04)}.baft{background:rgba(0,220,130,.04)}
.bic{font-size:.95rem;flex-shrink:0;line-height:1.3}
.btx{font-size:.74rem;color:rgba(255,255,255,.52);line-height:1.55}
.sv{background:linear-gradient(135deg,rgba(232,160,48,.1),rgba(0,212,200,.08));border:1px solid rgba(232,160,48,.2);border-radius:8px;padding:.85rem;text-align:center;margin-bottom:1rem}
.svl{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,160,48,.6);margin-bottom:.28rem}
.svv{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#e8a030}
.tools{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.4rem}
.tool{font-size:.58rem;padding:.2rem .58rem;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.42);font-family:'DM Mono',monospace;letter-spacing:.05em;border-radius:20px}
.cta{display:block;background:linear-gradient(135deg,#1a5aff,#00d4c8);color:#fff;text-align:center;padding:.95rem;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 4px 28px rgba(0,212,200,.2)}
.cta:hover{opacity:.85}
#hint{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.18);z-index:100;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bpulse{0%,100%{filter:drop-shadow(0 0 10px rgba(0,212,200,.6))}50%{filter:drop-shadow(0 0 22px rgba(0,212,200,.9))}}
@keyframes nring{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(1.1);opacity:.4}}
@keyframes dash{to{stroke-dashoffset:-24}}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<svg id="wsvg"><defs id="svgdefs"></defs><g id="wires"></g><g id="dots"></g></svg>
<div id="cdot"></div><div id="cring"></div>
<div id="hdr">
  <div class="hlogo">Learning<em>AI</em>withLaureen</div>
  <div class="hbadge">The Neural Mirror</div>
</div>
<div id="hint">Click any node to see how AI mirrors you</div>
<div id="bw" onclick="openCenter()">
  <div style="position:relative;width:108px;height:108px">
    <div class="br1"></div><div class="br2"></div>
    <div class="bc"><div class="be">🧠</div><div class="bl">AI Core</div></div>
  </div>
</div>
<div id="panel"><button class="pcls" onclick="closePanel()">✕</button><div id="pb"></div></div>

<script>
const ND=[
  {id:0,l:'Clients\n& People',   ic:'👥',col:'#4488ff',a:270,hf:'👤',af:'🤖',
   hC:'Memory & Relationships',hD:'You rely on memory to recall every client preference, conversation, and history — stored across scattered notes and emails.',
   aC:'Long-Term AI Memory',   aD:'AI never forgets a single interaction. It surfaces the full client history in seconds, every single time.',
   bef:'2–3 hrs/week re-explaining context, digging through old notes',aft:'Instant recall of every client detail — automatically',sv:'~2.5 hours back every week',ts:['Claude AI','ChatGPT','Copilot']},
  {id:1,l:'Email &\nComms',      ic:'📧',col:'#a855f7',a:315,hf:'✍️',af:'⚡',
   hC:'Language & Expression', hD:'You compose every email from scratch — drawing on tone, context, and knowledge of the recipient.',
   aC:'Large Language Models',  aD:'Claude reads, prioritizes, and drafts replies in your exact voice — at human level, in seconds.',
   bef:'45+ min/day reading, sorting, and writing emails',aft:'AI drafts every reply in your voice — send in one click',sv:'~4 hours back every week',ts:['Claude AI','ChatGPT','Copilot']},
  {id:2,l:'Billing &\nInvoicing',ic:'💰',col:'#00e676',a:0,hf:'🧾',af:'🔄',
   hC:'Pattern Recognition',   hD:'Your brain spots billing patterns from experience — what to charge, who needs follow-up, what\'s overdue.',
   aC:'Neural Networks & Rules',aD:'AI generates invoices, tracks payments, and chases accounts automatically — without fatigue or error.',
   bef:'30+ min per invoice, manual tracking, awkward payment chasing',aft:'Invoices auto-created, sent, tracked, and followed up',sv:'~2 hours back every week',ts:['Power Automate','Zapier','Claude AI']},
  {id:3,l:'Scheduling\n& Calendar',ic:'🗓️',col:'#ffd60a',a:45,hf:'📅',af:'🤖',
   hC:'Planning & Time',       hD:'You juggle availability and priorities — making real-time decisions about meetings and what can wait.',
   aC:'Predictive Scheduling', aD:'AI knows your constraints — booking, rescheduling, and sending reminders without you touching it.',
   bef:'20–30 min/day managing meetings and rescheduling',aft:'AI books, confirms, and adjusts your full schedule',sv:'~2 hours back every week',ts:['Copilot','Power Automate','Zapier']},
  {id:4,l:'Content &\nSocial',   ic:'📱',col:'#ff4081',a:90,hf:'💭',af:'✨',
   hC:'Creativity & Storytelling',hD:'You generate ideas, find the angle, write the caption — every post costs real creative energy.',
   aC:'Generative AI',         aD:'AI produces 30 content ideas and 10 draft captions in 5 minutes — sounding exactly like you.',
   bef:'3–4 hours/week brainstorming, writing, and scheduling posts',aft:'AI generates 30 posts in 5 minutes — you just choose and publish',sv:'~3 hours back every week',ts:['Claude AI','ChatGPT','Copilot']},
  {id:5,l:'Data &\nAnalytics',   ic:'📊',col:'#00d4c8',a:135,hf:'📈',af:'🔍',
   hC:'Intuition & Patterns',  hD:'You develop gut feel for what the numbers mean — built from experience reading reports over time.',
   aC:'Predictive Analytics',  aD:'AI processes all your data simultaneously, spots trends you\'d miss, delivers clear insights.',
   bef:'1–2 hours/week compiling reports and reviewing spreadsheets',aft:'AI delivers actionable weekly summaries automatically',sv:'~1.5 hours back every week',ts:['Copilot','Power Automate','Claude AI']},
  {id:6,l:'Healthcare\nOps',     ic:'🏥',col:'#ff6b35',a:180,hf:'👩‍⚕️',af:'🏆',
   hC:'Domain Expertise',      hD:'Medical billing requires deep knowledge of codes, payer rules, and denial patterns — years of training.',
   aC:'Specialized AI',        aD:'AI handles code lookup, claim submission, denial management, and compliance — expert-level, instantly.',
   bef:'3+ hours/day on EHR entry, coding, claims, and denial management',aft:'AI handles coding, submission, and denial appeals automatically',sv:'~12 hours back every week',ts:['Claude AI','ChatGPT','Power Automate']},
  {id:7,l:'Security &\nCompliance',ic:'🔒',col:'#e040fb',a:225,hf:'👀',af:'🛡️',
   hC:'Vigilance & Risk',      hD:'You stay alert to risks — a constant background mental drain that costs energy all day.',
   aC:'Continuous Monitoring', aD:'AI runs 24/7 compliance monitoring, flags risks in real time, enforces HIPAA rules.',
   bef:'Manual compliance checks, reactive after problems occur',aft:'AI monitors continuously and alerts before issues become problems',sv:'Peace of mind 24/7',ts:['Copilot','Power Automate','Claude AI']}
];

let W=innerWidth, H=innerHeight, cx=W/2, cy=H/2;
let mx=0,my=0,rmx=0,rmy=0,angle=0,paused=false;
const ORBIT=()=>Math.min(W,H)*.30;

// BG
const bgc=document.getElementById('bgc');
const bx=bgc.getContext('2d');
let pts=[];
function initBG(){
  bgc.width=W; bgc.height=H; cx=W/2; cy=H/2;
  pts=Array.from({length:55},()=>({
    x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,
    vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,
    c:['#4488ff','#00d4c8','#e8a030','#a855f7'][Math.floor(Math.random()*4)],a:Math.random()*.45+.1
  }));
}
initBG();
function drawBG(){
  bx.clearRect(0,0,W,H);
  const g=bx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));
  g.addColorStop(0,'#071628');g.addColorStop(.5,'#040e1e');g.addColorStop(1,'#020810');
  bx.fillStyle=g;bx.fillRect(0,0,W,H);
  bx.save();bx.globalAlpha=.022;bx.strokeStyle='#4488ff';bx.lineWidth=.5;
  for(let x=0;x<W;x+=80){bx.beginPath();bx.moveTo(x,0);bx.lineTo(x,H);bx.stroke();}
  for(let y=0;y<H;y+=80){bx.beginPath();bx.moveTo(0,y);bx.lineTo(W,y);bx.stroke();}
  bx.restore();
  [[cx*.3,cy*.4,'#4488ff',.045],[cx*1.7,cy*1.6,'#a855f7',.038],[cx*.35,cy*1.5,'#00d4c8',.032]].forEach(([ox,oy,c,a])=>{
    const rgb=parseInt(c.slice(1),16),r=(rgb>>16)&255,gg=(rgb>>8)&255,b=rgb&255;
    const gr=bx.createRadialGradient(ox,oy,0,ox,oy,320);
    gr.addColorStop(0,`rgba(${r},${gg},${b},${a})`);gr.addColorStop(1,'rgba(0,0,0,0)');
    bx.fillStyle=gr;bx.fillRect(0,0,W,H);
  });
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    bx.save();bx.globalAlpha=p.a*.3;bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=p.c;bx.fill();bx.restore();
  });
}

// Node pos
function npos(nd){
  const r=(nd.a+angle)*Math.PI/180, O=ORBIT();
  return{x:cx+Math.cos(r)*O, y:cy+Math.sin(r)*O*.58};
}

// SVG setup (create once)
const svgNS='http://www.w3.org/2000/svg';
const wsvg=document.getElementById('wsvg');
const wiresG=document.getElementById('wires');
const dotsG=document.getElementById('dots');
const defs=document.getElementById('svgdefs');
const wirePaths=[], travDots=[];

function hexRgb(h){const n=parseInt(h.slice(1),16);return`${(n>>16)&255},${(n>>8)&255},${n&255}`;}

function initSVG(){
  wsvg.setAttribute('width',W); wsvg.setAttribute('height',H);
  wiresG.innerHTML=''; dotsG.innerHTML=''; defs.innerHTML='';
  ND.forEach((nd,i)=>{
    // Gradient
    const gid=`g${i}`;
    const grad=document.createElementNS(svgNS,'linearGradient');
    grad.setAttribute('id',gid); grad.setAttribute('gradientUnits','userSpaceOnUse');
    const s1=document.createElementNS(svgNS,'stop'); s1.setAttribute('offset','0%'); s1.setAttribute('stop-color',`rgba(${hexRgb(nd.col)},.65)`);
    const s2=document.createElementNS(svgNS,'stop'); s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',`rgba(${hexRgb(nd.col)},.08)`);
    grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad);

    // Glow wire
    const gw=document.createElementNS(svgNS,'path');
    gw.setAttribute('stroke',`rgba(${hexRgb(nd.col)},.1)`); gw.setAttribute('stroke-width','7'); gw.setAttribute('fill','none');
    wiresG.appendChild(gw);

    // Main wire
    const wp=document.createElementNS(svgNS,'path');
    wp.setAttribute('id',`wp${i}`); wp.setAttribute('stroke',`url(#${gid})`);
    wp.setAttribute('stroke-width','1.2'); wp.setAttribute('fill','none');
    wp.setAttribute('stroke-dasharray','5 9'); wp.style.animation=`dash ${3+i*.4}s linear infinite`;
    wiresG.appendChild(wp);
    wirePaths.push({gw, wp, gid, grad});

    // Traveling dot
    const circ=document.createElementNS(svgNS,'circle');
    circ.setAttribute('r','3.5'); circ.setAttribute('fill',nd.col); circ.setAttribute('opacity','.8');
    const anim=document.createElementNS(svgNS,'animateMotion');
    anim.setAttribute('dur',`${2.6+i*.42}s`); anim.setAttribute('repeatCount','indefinite');
    const mp=document.createElementNS(svgNS,'mpath');
    mp.setAttributeNS('http://www.w3.org/1999/xlink','href',`#wp${i}`);
    anim.appendChild(mp); circ.appendChild(anim); dotsG.appendChild(circ);
    travDots.push(circ);
  });
}

function updateWires(){
  ND.forEach((nd,i)=>{
    const p=npos(nd);
    const mx2=(cx+p.x)/2, my2=(cy+p.y)/2, off=25;
    const d=`M ${cx} ${cy} Q ${mx2+off} ${my2-off} ${p.x} ${p.y}`;
    wirePaths[i].gw.setAttribute('d',d);
    wirePaths[i].wp.setAttribute('d',d);
    // Update gradient endpoints
    const grad=wirePaths[i].grad;
    grad.setAttribute('x1',cx); grad.setAttribute('y1',cy);
    grad.setAttribute('x2',p.x); grad.setAttribute('y2',p.y);
  });
}

// Node cards
const cards=[];
function createCards(){
  ND.forEach((nd,i)=>{
    const d=document.createElement('div');
    d.className='nc'; d.id=`nc${i}`;
    d.innerHTML=`
      <div class="norb" style="background:radial-gradient(circle at 35% 35%,${nd.col}18,${nd.col}06);border:1.5px solid ${nd.col}35;box-shadow:0 0 18px ${nd.col}22;color:${nd.col}" onclick="openPanel(${i})">
        <span style="font-size:1.35rem">${nd.ic}</span>
      </div>
      <div class="nlbl">${nd.l.replace('\n','<br>')}</div>
      <div class="nfig">${nd.hf}<span style="color:#00d4c8;font-size:.4rem;margin:0 2px">→</span>${nd.af}</div>`;
    document.body.appendChild(d);
    cards.push(d);
  });
}

function layoutCards(){
  ND.forEach((nd,i)=>{
    const p=npos(nd);
    cards[i].style.left=p.x+'px'; cards[i].style.top=p.y+'px';
  });
  document.getElementById('bw').style.left=cx+'px';
  document.getElementById('bw').style.top=cy+'px';
}

// Panel
const pill=t=>`<span class="tool">${t}</span>`;
function openPanel(i){
  const d=ND[i];
  document.getElementById('pb').innerHTML=`
<div class="pt">// AI Connection ${i+1} of 8</div>
<span class="pi">${d.ic}</span>
<div class="pti">${d.l.replace('\n',' ')}</div>
<div class="ps">"Your brain already does this every day.<br>AI mirrors it — faster, and without forgetting."</div>
<div class="pt">// You vs. AI — same function, different engine</div>
<div class="par">
  <div class="ph"><span class="pf">${d.hf}</span><span class="pb2 by">🧠 You</span><div class="phd">${d.hC}</div><div class="pbd">${d.hD}</div></div>
  <div class="pa"><span class="pf">${d.af}</span><span class="pb2 ba2">⚡ AI</span><div class="phd">${d.aC}</div><div class="pbd">${d.aD}</div></div>
</div>
<div class="pt">// Before & after</div>
<div class="baw">
  <div class="bar bbef"><span class="bic">😓</span><div class="btx">${d.bef}</div></div>
  <div class="bar baft"><span class="bic">🚀</span><div class="btx">${d.aft}</div></div>
</div>
<div class="sv"><div class="svl">Time you get back</div><div class="svv">⚡ ${d.sv}</div></div>
<div class="pt">// Tools powering this</div>
<div class="tools">${d.ts.map(pill).join('')}</div>
<a href="mailto:laureennicholson635@gmail.com" class="cta">Apply This To My Business →</a>`;
  document.getElementById('panel').classList.add('open');
}
function openCenter(){
  document.getElementById('pb').innerHTML=`
<div class="pt">// The Neural Mirror</div>
<span class="pi">🧠</span>
<div class="pti">Your brain, mirrored by AI</div>
<div class="ps" style="margin-bottom:1.4rem">"Every task you do — remembering, writing, billing, scheduling, creating, analyzing — your brain is already doing the heavy lifting every single day.<br><br>AI mirrors each function, running 24/7, so you can focus on what only you can do."</div>
<div class="sv"><div class="svl">Total time reclaimed</div><div class="svv">⚡ 15+ hours every week</div></div>
<div class="tools">${['ChatGPT','Claude AI','Copilot','Power Automate','Zapier'].map(pill).join('')}</div>
<a href="mailto:laureennicholson635@gmail.com" class="cta">Book Your Free AI Audit →</a>`;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');}

// Cursor
const cdot=document.getElementById('cdot'), cring=document.getElementById('cring');
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
document.addEventListener('mousedown',()=>paused=true);
document.addEventListener('mouseup',()=>paused=false);
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;initBG();initSVG();});

// Loop
function loop(){
  if(!paused)angle+=.1;
  drawBG();
  updateWires();
  layoutCards();
  rmx+=(mx-rmx)*.12;rmy+=(my-rmy)*.12;
  cdot.style.left=mx+'px';cdot.style.top=my+'px';
  cring.style.left=rmx+'px';cring.style.top=rmy+'px';
  requestAnimationFrame(loop);
}

createCards();
initSVG();
loop();
</script>
</body>
</html>
